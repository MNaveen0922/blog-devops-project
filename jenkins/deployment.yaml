apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins

spec:
  replicas: 1

  selector:
    matchLabels:
      app: jenkins

  template:
    metadata:
      labels:
        app: jenkins

    spec:
      serviceAccountName: jenkins

      securityContext:
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: jenkins

        image: jenkins/jenkins:lts

        ports:
        - containerPort: 8080

        - containerPort: 50000

        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"

          limits:
            cpu: "1000m"
            memory: "2Gi"

        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

      volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-pvc
