apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-cluster-role

rules:
- apiGroups: [""]
  resources:
  - pods
  - services
  - secrets
  - configmaps
  - persistentvolumeclaims
  verbs: ["*"]

- apiGroups: ["apps"]
  resources:
  - deployments
  verbs: ["*"]

- apiGroups: [""]
  resources:
  - namespaces
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-cluster-role-binding

subjects:
- kind: ServiceAccount
  name: jenkins
  namespace: jenkins

roleRef:
  kind: ClusterRole
  name: jenkins-cluster-role
  apiGroup: rbac.authorization.k8s.io
