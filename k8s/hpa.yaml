apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: twitter-app-hpa
  namespace: blogging-app

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: twitter-app-deployment

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70
